<h2>CUTTING PROGRAM SHEET</h2>

<form method="POST">

Code:
<select name="code" id="codeSelect">
{% for c in codes %}
<option value="{{c}}">{{c}}</option>
{% endfor %}
</select><br><br>

Fabric: <input name="fabric"><br><br>
DIA: <input name="dia"><br><br>
Type: <input name="ptype"><br><br>

Colour: <input name="colour"><br><br>
Size: <input name="size"><br><br>
Ratio: <input name="ratio"><br><br>
Roll: <input name="roll"><br><br>

<button>Save</button>

</form>

<hr>

<h3>PROGRAM LIST</h3>

<table border="1">
<tr>
<th>ID</th>
<th>Program</th>
<th>Fabric</th>
<th>Colour</th>
<th>Size</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[6]}}</td>
<td>{{row[7]}}</td>
<td>{{row[10]}}</td>
<td>
<a href="/delete/{{row[0]}}">Delete</a>
</td>
</tr>
{% endfor %}
</table>

<script>
document.getElementById("codeSelect").addEventListener("change", function(){
    fetch("/get_code/"+this.value)
    .then(res=>res.json())
    .then(data=>{
        document.getElementsByName("fabric")[0].value = data.fabric;
        document.getElementsByName("dia")[0].value = data.dia;
    });
});
</script>
