<!DOCTYPE html>
<html>
<head>
<title>Program</title>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px;}
input, select { padding:8px; margin:5px;}
button { background:#007bff; color:white; padding:8px;}
table { width:100%; border-collapse:collapse; margin-top:20px;}
th, td { border:1px solid #ccc; padding:8px;}
th { background:#007bff; color:white;}
</style>

</head>
<body>

<h2>Cutting Program Sheet</h2>

<form method="POST">

Code:
<select name="code" id="codeSelect">
{% for c in codes %}
<option value="{{c}}">{{c}}</option>
{% endfor %}
</select><br>

Fabric: <input name="fabric"><br>
DIA: <input name="dia"><br>
Type: <input name="ptype"><br>

Colour: <input name="colour"><br>
Size: <input name="size"><br>
Ratio: <input name="ratio"><br>
Roll: <input name="roll"><br>

<button>Save</button>

</form>

<hr>

<table>
<tr>
<th>ID</th>
<th>Program</th>
<th>Fabric</th>
<th>Colour</th>
<th>Size</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[6]}}</td>
<td>{{row[7]}}</td>
<td>{{row[10]}}</td>
<td><a href="/delete/{{row[0]}}">Delete</a></td>
</tr>
{% endfor %}
</table>

<script>
document.getElementById("codeSelect").addEventListener("change", function(){
    fetch("/get_code/"+this.value)
    .then(res=>res.json())
    .then(data=>{
        document.getElementsByName("fabric")[0].value = data.fabric;
        document.getElementsByName("dia")[0].value = data.dia;
    });
});
</script>

</body>
</html>
